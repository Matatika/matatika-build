{{- if .Values.ingress.enabled -}}
{{- $fullName := include "meltano-catalog.fullname" . -}}
{{- $ingressPaths := .Values.ingress.paths -}}
{{- $ingressClassName := .Values.ingress.className -}}
{{- $httpPort := .Values.appService.httpPort -}}
{{- $serviceName := .Values.appService.name -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/name: {{ include "meltano-catalog.name" . }}
    helm.sh/chart: {{ include "meltano-catalog.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $ingressClassName }}
#  backend:
#    serviceName: {{ include "meltano-catalog.fullname" . }}-{{ .Values.appService.name }}
#    servicePort: http
{{- if .Values.ingress.tls }}
  tls:
  {{- range .Values.ingress.tls }}
    - hosts:
      {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
  {{- end }}
{{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
    - host: {{ . | quote }}
      http:
        paths:
  {{- range $ingressPaths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-{{ $serviceName }}
                port:
                  number: {{ $httpPort }}
  {{- end }}
  {{- end }}
{{- end }}
